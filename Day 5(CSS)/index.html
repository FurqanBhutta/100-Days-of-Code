<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="card">
        <div class="name">Muhammad Furqan</div>
        <div class="content">
            <div class="image">
                <img src="myImage.jpeg" alt="">
            </div>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Minus, dolor asperiores? Commodi adipisci consequuntur officia dolores animi perferendis repellendus voluptates.</p>
            <div class="stats">
                <div class="posts">
                    <span class="number">108</span>
                    <span class="label">Posts</span>
                </div>
                <div class="followers">
                    <span class="number">457</span>
                    <span class="label">Followers</span>
                </div>
                <div class="following">
                    <span class="number">229</span>
                    <span class="label">Following</span>
                </div>
            </div>
            <div class="buttons">
                <button id="follow-btn" class="btn">Follow</button>
                <button id="message-btn" class="btn">Message</button>
            </div>
        </div>
    </div>
</body>
</html>
